name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Core install only — proves the offline demo needs no broker/LLM SDKs,
      # no API keys, and no network beyond pip itself.
      - name: Install (core + dev)
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test (offline, no keys)
        run: pytest -q
      - name: Offline demo smoke
        run: |
          python examples/smoke_test.py
          python -m strategies.trend --paper --instruments SPY,QQQ
